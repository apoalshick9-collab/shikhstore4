<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنترنت فائق السرعة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #fff; }
       .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
       .header { text-align: center; padding: 40px 0; }
       .header h1 { font-size: 3rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
       .packages { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin: 40px 0; }
       .package { background: #1e293b; border-radius: 20px; padding: 30px; border: 2px solid #334155; cursor: pointer; transition: all 0.3s; }
       .package:hover { border-color: #667eea; transform: translateY(-5px); }
       .package.selected { border-color: #667eea; background: #334155; }
       .package h3 { font-size: 1.8rem; margin-bottom: 15px; color: #667eea; }
       .speed { font-size: 2.5rem; font-weight: bold; margin: 15px 0; }
       .price { font-size: 2rem; color: #10b981; margin: 15px 0; }
       .features { list-style: none; margin: 20px 0; }
       .features li { padding: 8px 0; color: #cbd5e1; }
       .features li:before { content: "✓ "; color: #10b981; font-weight: bold; margin-left: 8px; }
       .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
       .modal.active { display: flex; align-items: center; justify-content: center; }
       .modal-content { background: #1e293b; padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
       .form-group { margin-bottom: 20px; }
       .form-group label { display: block; margin-bottom: 8px; color: #cbd5e1; }
       .form-group input,.form-group select { width: 100%; padding: 12px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: #fff; font-size: 1rem; }
       .form-group input:focus { border-color: #667eea; outline: none; }
       .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 40px; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; width: 100%; margin-top: 10px; }
       .btn:hover { opacity: 0.9; }
       .btn:disabled { opacity: 0.5; cursor: not-allowed; }
       .close { float: left; font-size: 28px; cursor: pointer; color: #cbd5e1; }
       .message { padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; }
       .success { background: #10b981; }
       .error { background: #ef4444; }
       .info { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 إنترنت فائق السرعة</h1>
            <p style="color: #cbd5e1; font-size: 1.2rem; margin-top: 10px;">اختر الباقة اللي تناسبك</p>
        </div>

        <div class="packages" id="packages"></div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="margin-bottom: 20px; color: #667eea;">تأكيد الطلب</h2>
            <div id="selectedPackageInfo" style="background: #0f172a; padding: 20px; border-radius: 10px; margin-bottom: 20px;"></div>

            <form id="orderForm">
                <div class="form-group">
                    <label>الاسم الكامل *</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف *</label>
                    <input type="tel" id="customerPhone" required>
                </div>
                <div class="form-group">
                    <label>المدينة *</label>
                    <input type="text" id="customerCity" required>
                </div>
                <div class="form-group">
                    <label>صورة إيصال الدفع (اختياري)</label>
                    <input type="file" id="paymentProof" accept="image/*">
                    <small style="color: #94a3b8; display: block; margin-top: 5px;">ارفع صورة التحويل أو الإيصال</small>
                </div>
                <div id="formMessage"></div>
                <button type="submit" class="btn" id="submitBtn">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC8dxXXX",
            authDomain: "flutter-ai-playground-c3bb0.firebaseapp.com",
            projectId: "flutter-ai-playground-c3bb0",
            storageBucket: "flutter-ai-playground-c3bb0.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let selectedPkg = null;

        // تحميل الباقات
        async function loadPackages() {
            const packagesDiv = document.getElementById('packages');
            packagesDiv.innerHTML = '<div style="text-align:center;grid-column:1/-1">جاري التحميل...</div>';

            try {
                const querySnapshot = await getDocs(collection(db, "packages"));
                packagesDiv.innerHTML = '';

                querySnapshot.forEach((doc) => {
                    const pkg = doc.data();
                    const div = document.createElement('div');
                    div.className = 'package';
                    div.innerHTML = `
                        <h3>${pkg.name}</h3>
                        <div class="speed">${pkg.speed}</div>
                        <div class="price">${pkg.price} ل.س / شهرياً</div>
                        <ul class="features">
                            ${pkg.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    `;
                    div.onclick = () => selectPackage(pkg, div);
                    packagesDiv.appendChild(div);
                });
            } catch (error) {
                packagesDiv.innerHTML = '<div class="message error">خطأ بتحميل الباقات. تأكد من الـ Rules</div>';
                console.error(error);
            }
        }

        function selectPackage(pkg, element) {
            document.querySelectorAll('.package').forEach(p => p.classList.remove('selected'));
            element.classList.add('selected');
            selectedPkg = pkg;

            document.getElementById('selectedPackageInfo').innerHTML = `
                <h3 style="color: #667eea;">${pkg.name}</h3>
                <p><strong>السرعة:</strong> ${pkg.speed}</p>
                <p><strong>السعر:</strong> ${pkg.price} ل.س / شهرياً</p>
            `;

            document.getElementById('orderModal').classList.add('active');
        }

        window.closeModal = function() {
            document.getElementById('orderModal').classList.remove('active');
            document.getElementById('orderForm').reset();
            document.getElementById('formMessage').innerHTML = '';
        }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('formMessage');

            btn.disabled = true;
            msg.innerHTML = '<div class="message info">جاري إرسال طلبك...</div>';

            try {
                const paymentProofFile = document.getElementById('paymentProof').files[0];
                let paymentProofUrl = '';

                // تحويل الصورة لـ Base64 بدل رفعها على Storage
                if (paymentProofFile) {
                    msg.innerHTML = '<div class="message info">جاري معالجة صورة الدفع...</div>';
                    paymentProofUrl = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(paymentProofFile);
                    });
                }

                await addDoc(collection(db, "orders"), {
                    name: document.getElementById('customerName').value,
                    phone: document.getElementById('customerPhone').value,
                    city: document.getElementById('customerCity').value,
                    packageName: selectedPkg.name,
                    packageSpeed: selectedPkg.speed,
                    packagePrice: selectedPkg.price,
                    paymentProof: paymentProofUrl,
                    paymentStatus: paymentProofUrl? 'تم الدفع' : 'بانتظار الدفع',
                    status: 'جديد',
                    createdAt: serverTimestamp()
                });

                msg.innerHTML = '<div class="message success">✅ تم إرسال طلبك بنجاح! رح نتواصل معك قريباً</div>';
                setTimeout(() => {
                    closeModal();
                }, 3000);

            } catch (error) {
                console.error(error);
                msg.innerHTML = '<div class="message error">❌ صار خطأ. حاول مرة تانية</div>';
            } finally {
                btn.disabled = false;
            }
        }

        loadPackages();
    </script>
</body>
</html>
