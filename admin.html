<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم متجر الشيخ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #121212;
            --red-accent: #e63946;
            --blue-accent: #00a8e8;
            --green-accent: #2ecc71;
            --orange-accent: #f39c12;
            --text-main: #f1f1f1;
            --text-secondary: #b3b3b3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Cairo", sans-serif; background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid #222; width: 90%; max-width: 400px; text-align: center; }
        .login-box h1 { font-family: "Tajawal", sans-serif; color: var(--blue-accent); margin-bottom: 30px; }
        .dashboard { display: none; padding: 20px; }
        nav { background: linear-gradient(90deg, #000, #1a1a1a); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red-accent); margin-bottom: 30px; }
        .logo { font-family: "Tajawal", sans-serif; font-size: 24px; font-weight: 900; color: var(--blue-accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links button { background: none; border: none; color: var(--text-main); font-size: 16px; font-weight: 600; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .nav-links button.active, .nav-links button:hover { color: var(--red-accent); background-color: rgba(230, 57, 70, 0.1); }
        .container { max-width: 1400px; margin: 0 auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .stat-card i { font-size: 40px; margin-bottom: 15px; }
        .stat-card h3 { font-size: 32px; margin-bottom: 5px; }
        .stat-card p { color: var(--text-secondary); }
        .section { display: none; background: var(--bg-card); padding: 30px; border-radius: 16px; border: 1px solid #222; margin-bottom: 20px; }
        .section.active { display: block; }
        h2 { font-family: "Tajawal", sans-serif; color: var(--blue-accent); margin-bottom: 20px; font-size: 28px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: var(--blue-accent); font-weight: 700; }
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: var(--text-main); font-size: 16px; }
        .btn { display: inline-block; background: linear-gradient(45deg, var(--red-accent), var(--blue-accent)); color: white; padding: 12px 25px; border-radius: 8px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; }
        .btn-green { background: var(--green-accent); }
        .btn-red { background: var(--red-accent); }
        .btn-sm { padding: 8px 15px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; color: var(--blue-accent); font-weight: 700; }
        tr:hover { background: #1a1a1a; }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .status-new { background: rgba(46, 204, 113, 0.2); color: var(--green-accent); }
        .status-processing { background: rgba(243, 156, 18, 0.2); color: var(--orange-accent); }
        .status-done { background: rgba(0, 168, 232, 0.2); color: var(--blue-accent); }
        .loader { text-align: center; padding: 40px; color: var(--green-accent); }
        @media (max-width: 768px) { nav { flex-direction: column; gap: 15px; } .nav-links { flex-wrap: wrap; justify-content: center; } table { font-size: 14px; } th, td { padding: 10px 5px; } }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1><i class="fa-solid fa-lock"></i> لوحة التحكم</h1>
            <div class="form-group">
                <input type="password" id="passwordInput" placeholder="كلمة المرور" onkeypress="if(event.key==='Enter') checkLogin()">
            </div>
            <button class="btn" onclick="checkLogin()">دخول</button>
            <p style="color: var(--text-secondary); margin-top: 15px; font-size: 14px;">كلمة السر: 123456</p>
        </div>
    </div>
    <div class="dashboard" id="dashboard">
        <nav>
            <div class="logo"><i class="fa-solid fa-bolt"></i>AL-SHEIKH Admin</div>
            <div class="nav-links">
                <button class="active" onclick="showSection('stats', this)">الإحصائيات</button>
                <button onclick="showSection('products', this)">المنتجات</button>
                <button onclick="showSection('orders', this)">الطلبات</button>
                <button onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</button>
            </div>
        </nav>
        <div class="container">
            <div class="section active" id="stats">
                <h2>نظرة عامة</h2>
                <div class="stats">
                    <div class="stat-card">
                        <i class="fa-solid fa-box" style="color: var(--blue-accent);"></i>
                        <h3 id="totalProducts">0</h3>
                        <p>إجمالي المنتجات</p>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-cart-shopping" style="color: var(--green-accent);"></i>
                        <h3 id="totalOrders">0</h3>
                        <p>إجمالي الطلبات</p>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-dollar-sign" style="color: var(--red-accent);"></i>
                        <h3 id="totalRevenue">$0</h3>
                        <p>إجمالي المبيعات</p>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-clock" style="color: var(--orange-accent);"></i>
                        <h3 id="newOrders">0</h3>
                        <p>طلبات جديدة</p>
                    </div>
                </div>
            </div>
            <div class="section" id="products">
                <h2>إدارة المنتجات</h2>
                <form id="productForm">
                    <div class="form-group">
                        <label>اسم المنتج</label>
                        <input type="text" id="productName" required>
                    </div>
                    <div class="form-group">
                        <label>السعر $</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>رابط الصورة</label>
                        <input type="url" id="productImage" placeholder="https://..." required>
                    </div>
                    <button type="submit" class="btn btn-green"><i class="fa-solid fa-plus"></i> إضافة منتج</button>
                </form>
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>السعر</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" class="loader"><i class="fa-solid fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="section" id="orders">
                <h2>الطلبات</h2>
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الزبون</th>
                            <th>الجوال</th>
                            <th>المجموع</th>
                            <th>الحالة</th>
                            <th>تفاصيل</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" class="loader"><i class="fa-solid fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
